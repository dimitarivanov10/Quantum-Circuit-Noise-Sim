<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Circuit Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="icon"
      type="image/png"
      href="../assets/quantum_circuit_logo.ico"
    />
  </head>

  <body>
    <div class="main-layout">
      <aside class="controls">
        <span class="gate-label" style="font-size: 0.9rem; color: #f1f5f9"
          >Circuit Controls</span
        >
        <hr
          style="
            border: 0;
            border-top: 1px solid #334155;
            width: 100%;
            margin: 8px 0;
          "
        />

        <div class="gate-group">
          <span class="gate-label">Target Qubit</span>
          <div class="segmented-control">
            <input
              type="radio"
              id="target-0"
              name="target-qubit"
              value="0"
              checked
            />
            <label for="target-0">Qubit 0</label>
            <input type="radio" id="target-1" name="target-qubit" value="1" />
            <label for="target-1">Qubit 1</label>
          </div>
        </div>

        <div class="gate-group">
          <span class="gate-label">Pauli Gates</span>
          <button onclick="applyGate('x')">Apply X Gate</button>
          <button onclick="applyGate('y')" style="margin-top: 4px">
            Apply Y Gate
          </button>
          <button onclick="applyGate('z')" style="margin-top: 4px">
            Apply Z Gate
          </button>
        </div>

        <div class="gate-group">
          <span class="gate-label">Superposition</span>
          <button onclick="applyGate('h')">Apply H Gate</button>
        </div>

        <div class="gate-group">
          <span class="gate-label">Phase Rotations</span>
          <button onclick="applyGate('s')">Apply S Gate</button>
          <button onclick="applyGate('t')" style="margin-top: 4px">
            Apply T Gate
          </button>
        </div>

        <div class="gate-group">
          <span class="gate-label">Entanglement (CNOT)</span>
          <div class="segmented-control">
            <input type="radio" id="control-0" name="control-qubit" value="0" />
            <label for="control-0">Ctrl: Q0</label>
            <input
              type="radio"
              id="control-1"
              name="control-qubit"
              value="1"
              checked
            />
            <label for="control-1">Ctrl: Q1</label>
          </div>
          <button onclick="applyGate('cnot')" style="margin-top: 4px">
            Apply CNOT
          </button>
        </div>

        <div class="gate-group">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <span class="gate-label" style="margin-bottom: 0">Noise Level</span>
            <span style="font-size: 0.75rem; color: #22d3ee; font-weight: bold"
              ><span id="noise-display">0</span>%</span
            >
          </div>
          <input
            type="range"
            id="noise-slider"
            min="0"
            max="20"
            value="0"
            step="1"
            style="width: 100%"
          />
        </div>
      </aside>

      <main class="container">
        <h1>Quantum Engine v1.0</h1>

        <div class="state-box">
          <span class="gate-label">Amplitude Vector</span>
          <div id="state-display" class="state-val">
            [1.000, 0.000]<br />[0.000, 0.000]
          </div>
        </div>

        <div class="analysis-meter">
          <div class="fidelity-header">
            <span class="gate-label">System Fidelity</span>
            <span style="color: #22d3ee; font-weight: bold"
              ><span id="fidelity-val">100</span>%</span
            >
          </div>
          <div class="progress-bar-bg">
            <div id="fidelity-bar" style="width: 100%"></div>
          </div>
        </div>

        <div class="action-grid">
          <button onclick="applyGate('measure')" class="btn-main measure">
            Measure System
          </button>
          <button onclick="resetCircuit()" class="btn-main reset">
            System Reset
          </button>
        </div>
      </main>

      <section class="visualizer-container">
        <span class="gate-label">Bloch Sphere Projection</span>
        <div id="canvas-wrapper">
          <div class="sphere-box">
            <span class="gate-label">Qubit 0</span>
            <img
              id="bloch-sphere-1"
              class="quantum-sphere"
              src=""
              style="display: none"
            />
          </div>
          <div class="sphere-box">
            <span class="gate-label">Qubit 1</span>
            <img
              id="bloch-sphere-0"
              class="quantum-sphere"
              src=""
              style="display: none"
            />
          </div>
          <div id="visual-placeholder">Initialize gate to project state</div>
        </div>

        <div class="history-log">
          <span class="gate-label">Measurement History</span>
          <div id="log-list"></div>
        </div>
      </section>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
